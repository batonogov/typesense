name: Release

on:
  push:
    tags:
      - "v*.*"
      - "v*.*.rc*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version info
        id: version
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION=${TAG_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

          # Check if this is a prerelease (contains 'rc')
          if [[ "$VERSION" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "release_type=Release Candidate" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "release_type=Stable Release" >> $GITHUB_OUTPUT
          fi

      - name: Extract Typesense version from Dockerfile
        id: typesense
        run: |
          TYPESENSE_VERSION=$(grep -oP 'typesense/typesense:\K[0-9]+\.[0-9]+(?:\.rc[0-9]+)?' Dockerfile)
          echo "version=$TYPESENSE_VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" $LAST_TAG..HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          fi

          # Save to file to preserve formatting
          echo "## Changes" > changelog.md
          if [ -n "$COMMITS" ]; then
            echo "$COMMITS" >> changelog.md
          else
            echo "- Initial release" >> changelog.md
          fi

      - name: Wait for Docker image availability
        run: |
          echo "⏳ Waiting for Docker image to be available..."
          IMAGE="ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"

          # Wait up to 10 minutes for image to be available
          for i in {1..20}; do
            echo "Attempt $i/20: Checking image availability..."
            if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
              echo "✅ Image is available: $IMAGE"
              break
            fi

            if [ $i -eq 20 ]; then
              echo "⚠️ Image not available after 10 minutes, proceeding anyway..."
            else
              echo "Image not yet available, waiting 30 seconds..."
              sleep 30
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease }}
          name: "Typesense ${{ steps.version.outputs.version }}"
          body: |
            # Typesense with Healthcheck ${{ steps.version.outputs.version }}

            🚀 **${{ steps.version.outputs.release_type }}** of Typesense with integrated healthcheck support.

            ## 📋 Release Information

            - **Version**: `${{ steps.version.outputs.version }}`
            - **Typesense Core**: `${{ steps.typesense.outputs.version }}`
            - **Release Type**: ${{ steps.version.outputs.release_type }}
            - **Docker Registry**: GitHub Container Registry (GHCR)

            ## 🐳 Docker Images

            ### Pull Commands
            ```bash
            # Specific version
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}

            # With tag
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag_name }}
            ```

            ### Quick Start
            ```bash
            docker run -d \
              --name typesense \
              -p 8108:8108 \
              -e TYPESENSE_API_KEY=your-secret-api-key \
              -v typesense-data:/data \
              ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ```

            ### Docker Compose
            ```yaml
            version: '3.8'
            services:
              typesense:
                image: ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
                ports:
                  - "8108:8108"
                environment:
                  - TYPESENSE_API_KEY=your-secret-api-key
                volumes:
                  - typesense-data:/data
                healthcheck:
                  test: ["CMD", "curl", "--fail", "http://localhost:8108/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 30s
            volumes:
              typesense-data:
            ```

            ## ✨ Features

            - ✅ **Built-in Healthcheck**: Automatic health monitoring with `/health` endpoint
            - ✅ **Multi-Architecture**: Supports `linux/amd64` and `linux/arm64`
            - ✅ **Production Ready**: Optimized for container orchestration
            - ✅ **Security**: Signed images with Cosign
            - ✅ **Monitoring**: Container health status for Docker Swarm, Kubernetes, etc.

            ## 🔧 Configuration

            | Environment Variable | Default | Description |
            |---------------------|---------|-------------|
            | `TYPESENSE_API_KEY` | - | **Required** API key for authentication |
            | `TYPESENSE_DATA_DIR` | `/data` | Data directory path |
            | `TYPESENSE_LISTEN_ADDRESS` | `0.0.0.0` | Listen address |
            | `TYPESENSE_LISTEN_PORT` | `8108` | Listen port |

            ## 📊 Healthcheck Details

            - **Endpoint**: `http://localhost:8108/health`
            - **Interval**: 30 seconds
            - **Timeout**: 10 seconds
            - **Retries**: 3 attempts
            - **Start Period**: 30 seconds

            ## 🔗 Links

            - 📚 [Documentation](https://github.com/${{ github.repository }}/blob/main/README.md)
            - 🐳 [Docker Hub](https://github.com/${{ github.repository }}/pkgs/container/typesense)
            - 🏠 [Typesense Official](https://typesense.org/)
            - 🛠️ [Typesense Docs](https://typesense.org/docs/)

            $(cat changelog.md)

            ---

            **Image Details:**
            - **Registry**: `ghcr.io/${{ github.repository }}`
            - **Available Tags**: `${{ steps.version.outputs.version }}`, `${{ steps.version.outputs.tag_name }}`${{ steps.version.outputs.is_prerelease == 'false' && ', `latest`' || '' }}
            - **Platforms**: `linux/amd64`, `linux/arm64`
            - **Base Image**: `typesense/typesense:${{ steps.typesense.outputs.version }}`

            > 💡 **Tip**: Use `docker inspect ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}` to view detailed image information.

          generate_release_notes: true
          make_latest: ${{ steps.version.outputs.is_prerelease == 'false' }}

      - name: Update latest tag for stable releases
        if: steps.version.outputs.is_prerelease == 'false'
        run: |
          git tag -d latest || true
          git push origin :refs/tags/latest || true
          git tag latest
          git push origin latest

      - name: Verify Docker image after release
        run: |
          echo "🔍 Verifying Docker image accessibility..."
          IMAGE="ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"

          # Test image pull and basic functionality
          if docker pull "$IMAGE"; then
            echo "✅ Image pull successful"

            # Test basic container start
            CONTAINER_ID=$(docker run -d --rm \
              -e TYPESENSE_API_KEY=test-key \
              "$IMAGE" 2>/dev/null || echo "")

            if [ -n "$CONTAINER_ID" ]; then
              echo "✅ Container started successfully"
              sleep 10
              docker stop "$CONTAINER_ID" 2>/dev/null || true
            else
              echo "⚠️ Container start test skipped"
            fi
          else
            echo "⚠️ Image pull failed, but release was created"
          fi

      - name: Release summary
        run: |
          echo "## 🎉 Release ${{ steps.version.outputs.tag_name }} created successfully!"
          echo ""
          echo "**Type**: ${{ steps.version.outputs.release_type }}"
          echo "**Version**: ${{ steps.version.outputs.version }}"
          echo "**Typesense Core**: ${{ steps.typesense.outputs.version }}"
          echo "**Docker Image**: ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"
          echo "**Release URL**: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag_name }}"
          echo ""
          echo "### Quick Start Command:"
          echo "\`\`\`bash"
          echo "docker run -p 8108:8108 -e TYPESENSE_API_KEY=your-key ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}"
          echo "\`\`\`"
